server:
  port: 7860
  assets-path: /app/assets
  # Trust Hugging Face's reverse proxy so real client IPs are seen (auth rate-limiting)
  proxied: true

# Password-gate the whole dashboard. Values come from HF Space secrets — never committed.
# A session cookie keeps your devices logged in. Generate the values with:
#   glance secret:make            -> set as HF secret AUTH_SECRET_KEY
#   glance password:hash 'pw'     -> set as HF secret AUTH_PASSWORD_HASH
auth:
  secret-key: ${AUTH_SECRET_KEY}
  users:
    bruce:
      password-hash: ${AUTH_PASSWORD_HASH}

theme:
  # Note: assets are cached by the browser, changes to the CSS file
  # will not be reflected until the browser cache is cleared (Ctrl+F5)
  custom-css-file: /assets/user.css

document:
  head: |
    <script src="/assets/todoist.js" defer></script>

pages:
  # It's not necessary to create a new file for each page and include it, you can simply
  # put its contents here, though multiple pages are easier to manage when separated
  - $include: home.yml
